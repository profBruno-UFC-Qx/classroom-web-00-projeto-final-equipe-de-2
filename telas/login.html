<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nóbrega Auto Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/layout.css">
</head>
<body>

    <nav class="navbar navbar-oficina">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-wrench-adjustable me-2"></i>
                Nóbrega <span>Auto Center</span>
            </span>
        </div>
    </nav>

    <main class="tela-centralizada">
        <section class="container">
            <div class="row justify-content-center">
                <article class="col-12 col-sm-9 col-md-6 col-lg-4">
                    <div class="card card-oficina">
                        <div class="card-header text-center py-3">
                            <i class="bi bi-person-lock me-2"></i>Acesso ao Sistema
                        </div>
                        <div class="card-body p-4">
                            <p class="text-center mb-4" style="color: var(--cor-texto-suave); font-size: 0.9rem;">
                                Faça login para acessar o sistema.
                            </p>
                            <form action="#" method="POST">
                                <div class="mb-3">
                                    <label for="email">E-mail</label>
                                    <input type="email" class="form-control form-control-oficina" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                                </div>
                                <div class="mb-4">
                                    <label for="senha">Senha</label>
                                    <input type="password" class="form-control form-control-oficina" id="senha" name="senha" placeholder="••••••••" required>
                                    <div class="text-end mt-1">
                                        <a href="#" style="font-size: 0.82rem;">Esqueci minha senha</a>
                                    </div>
                                </div>
                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-oficina">Entrar</button>
                                </div>
                                <hr style="border-color: var(--cor-borda);">
                                <p class="text-center mb-0" style="font-size: 0.9rem; color: var(--cor-texto-suave);">
                                    Não tem conta? <a href="cadastro.html" class="fw-semibold">Cadastre-se aqui</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer-oficina">
        <div class="container">
            <p class="mb-0">&copy; 2026 Nóbrega Auto Center &mdash; Av. João Pessoa, 3737, Fortaleza-CE &nbsp;|&nbsp; (85) 3494-3737</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
