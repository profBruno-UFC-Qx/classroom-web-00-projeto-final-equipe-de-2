<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Veículo - Nóbrega Auto Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="shortcut icon" href="./img/image.png" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-oficina">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-wrench-adjustable me-2"></i>
                Nóbrega <span>Auto Center</span>
            </span>
        </div>
    </nav>

    <main class="tela-centralizada">
        <section class="container py-4">
            <div class="row justify-content-center">
                <article class="col-12 col-md-8 col-lg-5">
                    <div class="card card-oficina">
                        <header class="card-header text-center py-3">
                            <i class="bi bi-car-front me-2"></i>Cadastrar Veículo
                        </header>
                        <div class="card-body p-4">

                            <div id="erro-carro" class="erro-msg mb-3"></div>

                            <form id="form-carro">

                                <div class="mb-3">
                                    <label for="cpf-cliente">CPF do Cliente</label>
                                    <input type="text" class="form-control-oficina" id="cpf-cliente" placeholder="000.000.000-00" required>
                                </div>

                                <div class="mb-3">
                                    <label for="marca">Marca</label>
                                    <input type="text" class="form-control form-control-oficina" id="marca" placeholder="Ex: Fiat" required>
                                </div>

                                <div class="mb-3">
                                    <label for="modelo">Modelo</label>
                                    <input type="text" class="form-control form-control-oficina" id="modelo" placeholder="Ex: Argo" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="ano">Ano</label>
                                        <input type="number" class="form-control form-control-oficina" id="ano" placeholder="Ex: 2021" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="cor">Cor</label>
                                        <input type="text" class="form-control form-control-oficina" id="cor" placeholder="Ex: Branco" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="placa">Placa</label>
                                    <input type="text" class="form-control form-control-oficina" id="placa" placeholder="Ex: HBX-4E21" required>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-oficina">Cadastrar</button>
                                </div>

                                <hr class="separador">

                                <p class="text-center mb-0 texto-suave">
                                    <a href="index_funcionario.html" class="fw-semibold">Voltar ao painel</a>
                                </p>

                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer-oficina">
        <div class="container">
            <p class="mb-0">&copy; 2026 Nóbrega Auto Center &mdash; Av. João Pessoa, 3737, Fortaleza-CE &nbsp;|&nbsp; (85) 3494-3737</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cadastro_carros.js"></script>
</body>
</html>
