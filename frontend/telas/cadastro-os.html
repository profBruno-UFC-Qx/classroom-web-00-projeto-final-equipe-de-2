<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Ordem de Serviço - Nóbrega Auto Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="shortcut icon" href="./img/image.png" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-oficina">
        <div class="container">
            <a class="logo-clicavel" href="home.html">
                <span class="navbar-brand">
                    <i class="bi bi-wrench-adjustable me-2"></i>
                    Nóbrega <span>AutoCenter</span>
                    <li class="nav-item ms-lg-2"><a class="nav-link nav-link-oficina" href="login.html" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sair</a></li>
                </span>
            </a>
        </div>
    </nav>

    <main class="tela-centralizada">
        <section class="container py-4">
            <div class="row justify-content-center">
                <article class="col-12 col-md-8 col-lg-6">
                    <div class="card card-oficina">
                        <header class="card-header text-center py-3">
                            <i class="bi bi-file-earmark-plus me-2"></i>Nova Ordem de Serviço
                        </header>
                        <div class="card-body p-4">

                            <div id="erro-os" class="erro-msg mb-3"></div>

                            <form id="form-os">

                                <div class="mb-3">
                                    <label for="placa-carro">Placa do Veículo</label>
                                    <input type="text" class="form-control-oficina" id="placa-carro" placeholder="Ex: ABC-1234" required>
                                </div>

                                <div class="mb-3">
                                    <label for="numero-os">Número da OS</label>
                                    <input type="text" class="form-control-oficina" id="numero-os" placeholder="Ex: 0001" required>
                                </div>

                                <div class="mb-3">
                                    <label for="descricao">Descrição do Serviço</label>
                                    <input type="text" class="form-control-oficina" id="descricao" placeholder="Ex: Troca de óleo" required>
                                </div>

                                <div class="mb-3">
                                    <label for="estado">Status</label>
                                    <select class="form-control-oficina" id="estado" required>
                                        <option value="" disabled selected>Selecione...</option>
                                        <option value="em_espera">Em espera</option>
                                        <option value="em_andamento">Em andamento</option>
                                        <option value="concluido">Concluído</option>
                                    </select>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="data-entrada">Data de Entrada</label>
                                        <input type="date" class="form-control-oficina" id="data-entrada">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label for="data-conclusao">Data de Conclusão</label>
                                        <input type="date" class="form-control-oficina" id="data-conclusao">
                                    </div>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn-oficina">Cadastrar OS</button>
                                </div>

                                <hr class="separador">

                                <p class="text-center mb-0 texto-suave">
                                    <a href="ordens-servico.html" class="fw-semibold">Voltar para lista</a>
                                </p>

                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer-oficina">
        <div class="container">
            <p class="mb-0">&copy; 2026 Nóbrega Auto Center &mdash; Av. João Pessoa, 3737, Fortaleza-CE &nbsp;|&nbsp; (85) 3494-3737</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cadastro-os.js"></script>
    <script>
        function logout() {
            localStorage.clear(); 
            window.location.href = "home.html"; 
        }
    </script>
</body>
</html>
