<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Nóbrega Auto Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
</head>
<body>

    <nav class="navbar navbar-oficina">
        <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-wrench-adjustable me-2"></i>
                Nóbrega <span>Auto Center</span>
            </span>
        </div>
    </nav>

    <main class="tela-centralizada">
        <section class="container py-4">
            <div class="row justify-content-center">
                <article class="col-12 col-md-8 col-lg-6">
                    <div class="card card-oficina">
                        <header class="card-header text-center py-3">
                            <i class="bi bi-person-plus me-2"></i>Cadastro de Usuário
                        </header>
                        <div class="card-body p-4">
                            <form action="#" method="POST">

                                <div class="mb-3">
                                    <label for="nome">Nome completo</label>
                                    <input type="text" class="form-control form-control-oficina" id="nome" name="nome" placeholder="Seu nome completo" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email">E-mail</label>
                                    <input type="email" class="form-control form-control-oficina" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                                </div>

                                <div class="mb-3">
                                    <label for="telefone">Telefone</label>
                                    <input type="tel" class="form-control form-control-oficina" id="telefone" name="telefone" placeholder="(85) 99999-9999">
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="senha">Senha</label>
                                        <input type="password" class="form-control form-control-oficina" id="senha" name="senha" placeholder="••••••••" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="confirmar-senha">Confirmar senha</label>
                                        <input type="password" class="form-control form-control-oficina" id="confirmar-senha" name="confirmar_senha" placeholder="••••••••" required>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="perfil">Tipo de usuário</label>
                                    <select class="form-select form-control-oficina" id="perfil" name="perfil" required>
                                        <option value="" disabled selected>Selecione...</option>
                                        <option value="cliente">Cliente</option>
                                        <option value="funcionario">Funcionário</option>
                                        <option value="admin">Administrador</option>
                                    </select>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-oficina">Cadastrar</button>
                                </div>

                                <hr style="border-color: var(--cor-borda);">

                                <p class="text-center mb-0" style="font-size: 0.9rem; color: var(--cor-texto-suave);">
                                    Já tem conta? <a href="login.html" class="fw-semibold">Faça login aqui</a>
                                </p>

                            </form>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer-oficina">
        <div class="container">
            <p class="mb-0">&copy; 2025 Nóbrega Auto Center &mdash; Av. João Pessoa, 3737, Fortaleza-CE &nbsp;|&nbsp; (85) 3494-3737</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
